name: Agent coordination sweep

# Per-repo caller for the LMNTL-AI agent coordination sweep.
# See https://github.com/LMNTL-AI/workbench/blob/main/docs/onboarding-a-new-repo.md
# Protocol spec: https://github.com/LMNTL-AI/workbench/blob/main/dot_claude/playbooks/agent-coordination.md

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'If "1", print actions without writing.'
        required: false
        default: '0'

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  sweep:
    uses: LMNTL-AI/workbench/.github/workflows/_agent-sweep.yml@main
    with:
      dry-run: ${{ inputs.dry-run || '0' }}
    secrets: inherit
